<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coding Session 9</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Shopping Cart</h1>

  <h2>Products</h2>

  <button onclick="addToCart('Apple', 2)">Add Apple</button>
  <button onclick="addToCart('Banana', 3)">Add Banana</button>
  <button onclick="addToCart('Milk', 5)">Add Milk</button>
  <button onclick="openCart()">Open Cart</button>

  <div id="overlay" onclick="closeCart()"></div>

  <div id="cartModal">
    <h2>Your cart</h2>

    <div id="cart"></div>

    <button onclick="clearCart()">Clear Cart</button>
    <button onclick="closeCart()">Close</button>

    <h3>Total: <span id="total"></span></h3>
  </div>

  <script src="script.js"></script>
</body>
</html>
